	<script>
		const ws_sensors = new WebSocket("ws://127.0.0.1:3000/ws/sensors");
		// const ws_dh = new WebSocket("ws://127.0.0.1:3000/ws/dh");

		const dh_plot_elem = document.getElementById("plot_x_dh");
		const hc_plot_elem = document.getElementById("plot_x_hc");

		// const dh_output = document.getElementById("dh_events");
		// const hc_output = document.getElementById("hc_events");
		// const pr_output = document.getElementById("pr_events");
		const re_output = document.getElementById("re_events");
		const input = document.getElementById("input");
		ws_sensors.onmessage = (event) => {
			// console.log(event);
			const messageData = JSON.parse(event.data);
			switch (messageData.topic) {
				case "pr":
					document.getElementById("pr_div").style =
						`margin: auto; width: 100px; height: 100px; background-color: ${messageData.data}; border-radius: 50%`;

					break;
				case "dh":
					if (dh_plot_elem.childElementCount == 40) {
						dh_plot_elem.replaceChildren();
					}
					node = document
						.createRange()
						.createContextualFragment(messageData.data);
					dh_plot_elem.appendChild(node);
					break;
				case "hc":
					if (hc_plot_elem.childElementCount == 20) {
						hc_plot_elem.replaceChildren();
					}
					node = document
						.createRange()
						.createContextualFragment(messageData.data);
					hc_plot_elem.appendChild(node);
					break;
				case "re":
					re_output.innerHTML += `\n${messageData.data}`;
					break;
				case "rgb":
					break;
				case "gy": // Light Intensity
					document.getElementById("gy_div").style =
						`margin: auto; width: 100px; height: 100px; background-color: yellow; filter: brightness(${messageData.data}%); border-radius: 50%`;

					break;
				default:
					break;
			}
		};
